name: backend-docker

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-docker.yml'
      - 'docker-compose.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-docker.yml'
      - 'docker-compose.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  quality-gates:
    name: Backend quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt ruff safety pytest pytest-cov

      - name: Format check
        run: ruff format --check backend

      - name: Lint check
        run: ruff check backend

      - name: Dependency security scan
        run: safety check -r backend/requirements.txt --disable-optional-telemetry

      - name: Unit tests with coverage
        run: |
          cd backend
          pytest --cov=. --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-reports
          path: |
            backend/coverage.xml
            backend/.coverage

  build-and-scan:
    name: Build and scan backend image
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=/tmp/backend-image.tar

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          input: /tmp/backend-image.tar
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push backend image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          provenance: mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Job summary
        run: |
          echo "## Backend container image" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scan policy: fail on CRITICAL vulnerabilities" >> "$GITHUB_STEP_SUMMARY"

  integration-tests:
    name: Backend integration smoke test
    needs: build-and-scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run container locally
        run: |
          docker run -d --name backend-smoke -p 8000:8000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          for i in {1..20}; do
            curl -sf http://127.0.0.1:8000/docs && break
            sleep 3
          done

      - name: Cleanup container
        if: always()
        run: docker rm -f backend-smoke || true
